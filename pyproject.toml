[project]
name = "safari-writer"
version = "0.1.0"
description = "A UI-compatible clone of AtariWriter 80, built with Textual"
requires-python = ">=3.12"
dependencies = [
    "textual>=1.0.0",
    "pyenchant>=3.2.0",
]

[project.scripts]
safari-writer = "safari_writer.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["safari_writer"]
include = ["safari_writer/*.sfw"]

[dependency-groups]
dev = [
    "mypy>=1.19.0",
    "pylint>=3.3.0",
    "ruff>=0.11.0",
    "textual-dev>=1.0.0",
    "pytest>=8.0.0",
    "hypothesis>=6.151.9",
]

[tool.mypy]
python_version = "3.12"
files = ["safari_writer"]
warn_return_any = true
warn_unused_configs = true
show_error_codes = true
pretty = true

[[tool.mypy.overrides]]
module = ["enchant"]
ignore_missing_imports = true
