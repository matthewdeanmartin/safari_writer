---
name: Release
concurrency: changelog
on:
  release:
    types: [released]
permissions:
  contents: read
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      branch: ${{ steps.push.outputs.branch }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: {python-version: '3.12'}
      - name: Set up uv
        uses: hynek/setup-cached-uv@4300ec2180bc77d705e626a34e381b81a4772c51  # v2.5.0
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Bump changelog and version files
        id: release
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          uv run changelogmanager release \
            --override-version "$VERSION" \
            --bump-versions \
            --yes
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Commit and push bump branch
        id: push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          BRANCH="release/bump-${RELEASE_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add CHANGELOG.md pyproject.toml
          git add -u
          if git diff --cached --quiet; then
            echo "::warning::No files changed after release --bump-versions; is the version already bumped?"
            exit 1
          fi
          git commit -m "chore: release ${RELEASE_VERSION}"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"
          REMOTE_SHA="$(git ls-remote --heads origin "${BRANCH}" | awk '{print $1}')"
          if [ -n "${REMOTE_SHA}" ]; then
            git push \
              --force-with-lease="refs/heads/${BRANCH}:${REMOTE_SHA}" \
              origin \
              "HEAD:refs/heads/${BRANCH}"
          else
            git push origin "HEAD:refs/heads/${BRANCH}"
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          BASE_BRANCH: ${{ github.event.release.target_commitish }}
          REPO: ${{ github.repository }}
          BUMP_BRANCH: ${{ steps.push.outputs.branch }}
        run: |
          uv run changelogmanager github-pr \
            --repository "${REPO}" \
            --head "${BUMP_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --title "chore: release ${RELEASE_VERSION}" \
            --body "$(cat <<EOF
          Automated release PR for **${RELEASE_VERSION}**.
          Changes:
          - \`CHANGELOG.md\`: promoted \`[Unreleased]\` to \`${RELEASE_VERSION}\`
          - \`pyproject.toml\`: version bumped to \`${RELEASE_VERSION}\`
          - Source version strings updated to \`${RELEASE_VERSION}\`
          This PR was opened automatically by the Release workflow.
          Merge it once the PyPI publish below succeeds.
          EOF
          )"
  build:
    runs-on: ubuntu-latest
    needs: bump
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.bump.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with: {python-version: '3.12'}
      - name: Set up uv
        uses: hynek/setup-cached-uv@4300ec2180bc77d705e626a34e381b81a4772c51  # v2.5.0
      - name: Build
        run: |
          uv run python -c "from pathlib import Path; import shutil; shutil.rmtree(Path('dist'), ignore_errors=True)"
          uv run hatch -q build
      - name: Verify dist version matches release
        env:
          EXPECTED: ${{ needs.bump.outputs.version }}
        run: |
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL" ]; then
            echo "::error::No wheel found in dist/"
            exit 1
          fi
          if ! echo "$WHEEL" | grep -q "${EXPECTED}"; then
            echo "::error::Wheel ${WHEEL} does not contain expected version ${EXPECTED}"
            exit 1
          fi
          echo "Verified: ${WHEEL} matches version ${EXPECTED}"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: packages
          path: dist/
          if-no-files-found: error
          retention-days: 1
  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/safari-writer
    permissions:
      id-token: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: packages
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          verbose: 'true'
