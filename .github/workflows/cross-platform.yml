name: Cross-platform Tests

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/cross-platform.yml"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "safari_writer/**"
      - "safari_dos/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/cross-platform.yml"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "safari_writer/**"
      - "safari_dos/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.terminal_name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        shell_type: [bash, pwsh]
        include:
          - os: ubuntu-latest
            shell_type: bash
            terminal_name: bash
            term: xterm-256color
            msystem: ""
          - os: ubuntu-latest
            shell_type: pwsh
            terminal_name: pwsh
            term: xterm-256color
            msystem: ""
          - os: windows-latest
            shell_type: pwsh
            terminal_name: windows-powershell
            term: xterm-256color
            msystem: ""
          - os: windows-latest
            shell_type: bash
            terminal_name: git-bash
            term: xterm-256color
            msystem: MINGW64
          - os: macos-latest
            shell_type: bash
            terminal_name: bash
            term: xterm-256color
            msystem: ""
          - os: macos-latest
            shell_type: pwsh
            terminal_name: pwsh
            term: xterm-256color
            msystem: ""

    env:
      TERM: ${{ matrix.term }}
      COLORTERM: truecolor
      PYTHONUTF8: "1"
      MSYSTEM: ${{ matrix.msystem }}
      SAFARI_WRITER_CI_TERMINAL: ${{ matrix.terminal_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: hynek/setup-cached-uv@757bedc3f972eb7227a1aa657651f15a8527c817 # v2.3.0

      - name: Sync dependencies (bash)
        if: matrix.shell_type == 'bash'
        shell: bash
        run: uv sync --quiet --no-progress

      - name: Sync dependencies (pwsh)
        if: matrix.shell_type == 'pwsh'
        shell: pwsh
        run: uv sync --quiet --no-progress

      - name: Run pytest (bash)
        if: matrix.shell_type == 'bash'
        shell: bash
        run: uv run pytest tests/ -q --disable-warnings

      - name: Run pytest (pwsh)
        if: matrix.shell_type == 'pwsh'
        shell: pwsh
        run: uv run pytest tests/ -q --disable-warnings
